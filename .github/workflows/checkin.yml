name: Taoqitu Auto Checkin

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 赋予工作流删除权限
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Sign Script
        env:
          USER_TOKEN: ${{ secrets.USER_TOKEN }}
          ENABLE_OFFSET: ${{ secrets.ENABLE_OFFSET }}
        run: python sign.py

      # --- 新增：清理旧日志步骤 ---
      - name: Delete old workflow runs
        uses: Mattraiano/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 7  # 关键参数：保留最近的 7 条记录
