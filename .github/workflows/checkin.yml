name: Taoqitu Auto Checkin

# 触发条件
on:
  schedule:
    # 每天北京时间 08:30 运行 (UTC 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 支持手动点击运行按钮

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Sign Script
        env:
          # 从仓库的 Secrets 中读取变量
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        run: python sign.py
