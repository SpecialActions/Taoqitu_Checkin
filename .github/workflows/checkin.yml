name: Taoqitu Auto Checkin

on:
  schedule:
    - cron: '30 0 * * *'  # 每天北京时间 08:30
  workflow_dispatch:      # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Sign Script
        env:
          USER_TOKEN: ${{ secrets.USER_TOKEN }}
          ENABLE_OFFSET: ${{ secrets.ENABLE_OFFSET }}
        run: python sign.py

      # --- 修复：使用 Merkle-GmbH 维护的版本 ---
      - name: Delete old workflow runs
        uses: Merkle-GmbH/delete-workflow-runs@v2.0.3
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 7
          keep_minimum_runs: 7
