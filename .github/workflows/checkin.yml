name: Taoqitu Auto Checkin

on:
  schedule:
    - cron: '30 0 * * *'  # 每天北京时间 08:30 运行
  workflow_dispatch:      # 支持手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    # 赋予工作流必要的写入权限
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Sign Script
        env:
          USER_TOKEN: ${{ secrets.USER_TOKEN }}
          ENABLE_OFFSET: ${{ secrets.ENABLE_OFFSET }}
        run: python sign.py

      # --- 修改：使用更稳定的清理组件 ---
      - name: Delete old workflow runs
        uses: Major-Joe/delete-workflow-runs-action@v3
        with:
          github_token: ${{ github.token }}
          # 策略：保留最近 7 天的记录，且至少保留最近 7 次运行结果
          retain_days: 7
          keep_minimum_runs: 7
