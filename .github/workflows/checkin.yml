name: Taoqitu Auto Checkin

on:
  schedule:
    # 每天北京时间 08:30 运行
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        # ⚠️ 关键修改：必须安装 cloudscraper
        run: pip install requests cloudscraper

      - name: Run Sign Script
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        run: python sign.py
